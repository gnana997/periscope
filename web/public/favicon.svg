<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="periscope">
  <title>periscope</title>
  <style>
    /* Italic 'p' from Instrument Serif. The font isn't embedded —
       browsers fall back to Georgia (a similar warm serif) when
       Instrument Serif isn't loaded, which is fine at favicon
       sizes where fine detail is invisible anyway. */
    .p { fill: #c2410c; }
    @media (prefers-color-scheme: dark) {
      .p { fill: #fb923c; }
    }
  </style>
  <text class="p" x="16" y="24"
        text-anchor="middle"
        font-family="'Instrument Serif', Georgia, 'Times New Roman', serif"
        font-size="32"
        font-style="italic"
        font-weight="400">p</text>
</svg>
