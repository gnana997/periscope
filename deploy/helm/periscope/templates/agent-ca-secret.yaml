{{- if .Values.agent.enabled -}}
# Empty placeholder Secret for the per-deployment agent CA (#42).
#
# The chart creates this Secret with no data keys; the server fills
# it on first boot via UPDATE (RBAC granted by agent-rbac.yaml).
# Subsequent restarts read the populated cert + key directly.
#
# `helm.sh/resource-policy: keep` so a `helm uninstall` doesn't wipe
# the CA — uninstalling and reinstalling without keeping the Secret
# would invalidate every previously-issued agent cert. If you really
# want to rotate the CA, delete the Secret manually after uninstall.
#
# Operators with externally-managed PKI can pre-populate ca.crt +
# ca.key here; the server treats both-keys-present as load-only and
# never overwrites.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.agent.caSecretName }}
  labels:
    {{- include "periscope.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
{{- end }}
