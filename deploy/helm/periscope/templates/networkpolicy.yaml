{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "periscope.fullname" . }}
  labels:
    {{- include "periscope.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "periscope.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- range .Values.networkPolicy.ingress.fromNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.service.port }}
    {{- end }}
    {{- with .Values.networkPolicy.ingress.extra }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Always-on: DNS to kube-dns. Without this, every other egress rule is moot
    # (the pod can't even resolve the IdP hostname).
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egress.extra }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
