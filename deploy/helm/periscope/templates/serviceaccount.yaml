{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "periscope.serviceAccountName" . }}
  labels:
    {{- include "periscope.labels" . | nindent 4 }}
  {{- /*
    Pod Identity (preferred): SA carries no IRSA annotation. The
    association is created out-of-band via the EKS API:
      aws eks create-pod-identity-association \
        --cluster-name <hosting> --namespace {{ .Release.Namespace }} \
        --service-account {{ include "periscope.serviceAccountName" . }} \
        --role-arn arn:aws:iam::<acct>:role/periscope-base
    IRSA: set serviceAccount.annotations to include
      eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/periscope-base
  */}}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
