{{- if eq .Values.secrets.mode "external" -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "periscope.secretName" . }}
  labels:
    {{- include "periscope.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.external.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.external.storeName is required when secrets.mode=external" .Values.secrets.external.storeName }}
    kind: {{ .Values.secrets.external.storeKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "periscope.secretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: {{ required "secrets.external.remoteKey is required when secrets.mode=external" .Values.secrets.external.remoteKey | quote }}
        {{- with .Values.secrets.external.remoteProperty }}
        property: {{ . | quote }}
        {{- end }}
{{- end }}
