{{- if eq .Values.secrets.mode "plain" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "periscope.secretName" . }}
  labels:
    {{- include "periscope.labels" . | nindent 4 }}
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: {{ required "secrets.plain.clientSecret is required when secrets.mode=plain" .Values.secrets.plain.clientSecret | quote }}
{{- end }}
