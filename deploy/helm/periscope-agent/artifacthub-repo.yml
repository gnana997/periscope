# Artifact Hub repository metadata for the periscope-agent chart.
#
# Pushed to the OCI registry as a metadata layer with the special
# `artifacthub.io` tag, so when the chart's repo is registered on
# Artifact Hub it can find publisher info, ownership claim, and
# verified-publisher proof. See:
# https://artifacthub.io/docs/topics/repositories/helm-charts/
#
# Why a separate file from the periscope chart's: Artifact Hub
# treats each OCI Helm-chart artifact as its own "repository" entry.
# Both periscope and periscope-agent live under
# ghcr.io/gnana997/charts/, but each needs its own AH registration
# + its own ownership-claim metadata layer.
#
# Push command (run once after the chart's first OCI push):
#
#   oras push ghcr.io/gnana997/charts/periscope-agent:artifacthub.io \
#     --config=/dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
#     deploy/helm/periscope-agent/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
#
# Then register on Artifact Hub:
#
#   1. https://artifacthub.io/control-panel/repositories
#   2. Add → Helm charts → name: periscope-agent
#      URL: oci://ghcr.io/gnana997/charts/periscope-agent
#   3. Copy the assigned UUID, paste below in repositoryID,
#      re-push the metadata layer (same oras command above) so
#      the ownership claim resolves.

repositoryID: b6dc080a-36b3-4934-890e-b1544f742958
# After registering the repo on Artifact Hub, replace the zeros above
# with the UUID Artifact Hub assigns to the repository. Re-push the
# metadata layer (same oras command above) to claim the OCI repo
# under your account.

owners:
  - name: gnana997
    email: gnana097@gmail.com
