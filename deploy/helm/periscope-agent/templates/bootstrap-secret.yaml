{{- if .Values.agent.registrationToken -}}
# Bootstrap-token Secret. Single-use — the agent reads it once on
# first boot, registers with the central server, and persists the
# resulting mTLS cert into the state Secret. The bootstrap Secret
# can be safely deleted after first registration succeeds.
#
# Why a Secret (vs a plain env value): keeps the token off the
# Deployment manifest, which often ends up in PR diffs / GitOps
# repos / log aggregators where a 15-min window is plenty for
# someone to pick it up.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "periscope-agent.bootstrapSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "periscope-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.agent.registrationToken | quote }}
{{- end }}
