{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "periscope-agent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "periscope-agent.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
# Namespace-scoped Role for the agent's own state Secret. Get/create/
# update — the agent persists its mTLS cert into this Secret on first
# registration and reads it on subsequent restarts.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "periscope-agent.fullname" . }}-state
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "periscope-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ .Values.agent.stateSecretName }}"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "periscope-agent.fullname" . }}-state
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "periscope-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "periscope-agent.fullname" . }}-state
subjects:
  - kind: ServiceAccount
    name: {{ include "periscope-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
